# SwiftLint Configuration for Neurova

excluded:
  - .build
  - DerivedData
  - Pods

disabled_rules:
  - trailing_comma
  - opening_brace
  - multiple_closures_with_trailing_closure
  - large_tuple

opt_in_rules:
  - closure_spacing
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - vertical_whitespace_closing_braces
  - static_over_final_class

line_length:
  warning: 200
  error: 350

type_body_length:
  warning: 800
  error: 1400

file_length:
  warning: 1000
  error: 1500

function_body_length:
  warning: 100
  error: 160

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 15
  error: 25

type_name:
  min_length: 2
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y
    - i
    - w
    - h
    - t

nesting:
  type_level: 3
  function_level: 3

force_cast:
  severity: warning

force_try:
  severity: warning
