# SwiftLint Configuration for Neurova

excluded:
  - .build
  - DerivedData
  - Pods

disabled_rules:
  - trailing_comma
  - opening_brace

opt_in_rules:
  - closure_spacing
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - vertical_whitespace_closing_braces

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 15
  error: 25

type_name:
  min_length: 2
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y
    - i

nesting:
  type_level: 3
  function_level: 3
