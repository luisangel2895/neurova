name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: Neurova.xcodeproj
  SCHEME: Neurova
  DERIVED_DATA_PATH: .build/DerivedData

jobs:
  build-and-test:
    name: Build and Unit Tests
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Create and boot iOS Simulator
        run: |
          set -euo pipefail

          echo "Available runtimes:"
          xcrun simctl list runtimes
          echo "Available device types:"
          xcrun simctl list devicetypes

          RUNTIME_ID="$(
            xcrun simctl list runtimes | \
            sed -nE 's/.*- (com\.apple\.CoreSimulator\.SimRuntime\.iOS[[:alnum:].-]*)$/\1/p' | \
            tail -n 1
          )"
          if [ -z "${RUNTIME_ID}" ]; then
            echo "No available iOS runtime found on runner."
            exit 1
          fi

          DEVICE_TYPE_ID="$(xcrun simctl list devicetypes | sed -nE 's/.*(com\.apple\.CoreSimulator\.SimDeviceType\.iPhone-17-Pro).*/\1/p' | head -n 1)"
          if [ -z "${DEVICE_TYPE_ID}" ]; then
            DEVICE_TYPE_ID="$(xcrun simctl list devicetypes | sed -nE 's/.*(com\.apple\.CoreSimulator\.SimDeviceType\.iPhone-16-Pro).*/\1/p' | head -n 1)"
          fi
          if [ -z "${DEVICE_TYPE_ID}" ]; then
            DEVICE_TYPE_ID="$(xcrun simctl list devicetypes | sed -nE 's/.*(com\.apple\.CoreSimulator\.SimDeviceType\.iPhone-15-Pro).*/\1/p' | head -n 1)"
          fi
          if [ -z "${DEVICE_TYPE_ID}" ]; then
            DEVICE_TYPE_ID="$(xcrun simctl list devicetypes | sed -nE 's/.*(com\.apple\.CoreSimulator\.SimDeviceType\.iPhone-14).*/\1/p' | head -n 1)"
          fi
          if [ -z "${DEVICE_TYPE_ID}" ]; then
            echo "No supported iPhone simulator device type found."
            exit 1
          fi

          SIM_NAME="Neurova-CI-Simulator"
          xcrun simctl delete "${SIM_NAME}" || true
          SIMULATOR_UDID="$(xcrun simctl create "${SIM_NAME}" "${DEVICE_TYPE_ID}" "${RUNTIME_ID}")"
          xcrun simctl boot "${SIMULATOR_UDID}"
          xcrun simctl bootstatus "${SIMULATOR_UDID}" -b

          echo "SIMULATOR_UDID=${SIMULATOR_UDID}" >> "$GITHUB_ENV"
          echo "Using simulator ${SIMULATOR_UDID} (${DEVICE_TYPE_ID}, ${RUNTIME_ID})"

      - name: Build for testing
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -configuration Debug \
            build-for-testing \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            test-without-building \
            -only-testing:NeurovaTests \
            CODE_SIGNING_ALLOWED=NO
